# =====================================================================
# W&B sweep 定義（速度チューニング版）: vel_coef も含めてハイパラの「当たり」を
# 自動探索するための設定。
#
# 【いつ使う?】baseline（完走方策）が固まった後の速度チューニング段階で。
# いまの段階では vel_coef=0 固定の sweeps/baseline_sweep.yaml の方を使います
# （README §7「まず baseline を固める」の方針。使い分けは README §4.5 表B）。
#
# 使い方:
#   1. 手元で一度だけ sweep を作る:  wandb sweep sweeps/classic_sweep.yaml
#      → 出力に entity/project/sweep_id が表示されるので控える。
#   2. Kaggle ノート（notebooks/kaggle_commit.ipynb）でその ID を使い agent を回す。
#
# 【重要】ここで使う metric（eval/mean_reward）はあくまで探索用の代理指標です。
# 最終選抜は必ず src/evaluate.py（素の環境・完走率・ゴール到達ステップ数）で行います。
# =====================================================================

program: src/train.py
project: bipedal-timetrial # configs の wandb_project と揃える（未指定だと W&B の
                           # 既定プロジェクトに run が散らばってしまうため必須）
method: bayes              # ベイズ最適化で良さそうな値を優先的に探す

metric:
  name: eval/mean_reward   # EvalCallback が記録する代理指標。最終判断には使わない。
  goal: maximize

# --- 探索するパラメータ（ここを編集して探索範囲を変える）------------
parameters:
  vel_coef:
    values: [2, 3, 4, 5]   # 速度ボーナス係数の候補
  seed:
    values: [0, 1, 2]      # シードを振って安定性も見る
  learning_rate:
    # 学習率を対数スケールで探索。固定したいときは values: [7.3e-4] に書き換える。
    min: 0.0001
    max: 0.001
    distribution: log_uniform_values
  use_wandb:
    value: true            # sweep 経由は常に W&B を有効化（固定値）

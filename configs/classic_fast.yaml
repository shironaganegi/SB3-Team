# =====================================================================
# classic fast: 速い歩容を狙う time-trial 用設定。
# vel_coef で前進速度を強めに加点し、time_penalty で1ステップごとに軽く減点して
# ゴール到達を急がせる。最終評価は src/evaluate.py（素の環境・完走率・ステップ数）で行う。
# 使い方: python src/train.py --config configs/classic_fast.yaml
# =====================================================================

# --- ■ よく変える項目 ------------------------------------------------
env_id: BipedalWalker-v3
vel_coef: 4          # speed(=2) より強めの前進ボーナス。速さ重視。
time_penalty: 0.02   # 1ステップごとの軽い減点。大きすぎると早期転倒の損切りを誘発するので控えめ。
seed: 0
total_timesteps: 1000000

# --- TQC ハイパラ（baseline と同じ定番値）---------------------------
learning_starts: 10000
batch_size: 256
buffer_size: 300000
learning_rate: 7.3e-4
use_sde: true
train_freq: 8
gradient_steps: 8
gamma: 0.98
tau: 0.02

# --- 評価・保存の間隔（普段はいじらなくてよい）----------------------
eval_freq: 10000
n_eval_episodes: 10
checkpoint_freq: 50000

# --- W&B ------------------------------------------------------------
use_wandb: false
wandb_project: bipedal-timetrial
wandb_entity: null

# =====================================================================
# classic speed: vel_coef=2 で軽く速度ボーナスを乗せた設定。
# baseline で完走方策が固まったあと、「タイムを縮めつつ完走率を保てるか」を試します。
# 使い方: python src/train.py --config configs/classic_speed.yaml
# baseline との違いは vel_coef だけ（下の1行）。他は同じ。
# =====================================================================

# --- ■ よく変える項目 ------------------------------------------------
env_id: BipedalWalker-v3
vel_coef: 2            # >0 なので学習環境にだけ SpeedReward が乗る。大きいほど速さ重視。
seed: 0
total_timesteps: 1000000

# --- TQC ハイパラ（baseline と同じ定番値）---------------------------
#     別のハイパラを試したいときは、ここに1行足すだけで自動的に TQC へ
#     渡ります（src/train.py の編集は不要）。
learning_starts: 10000
batch_size: 256
buffer_size: 300000
learning_rate: 7.3e-4
use_sde: true
train_freq: 8
gradient_steps: 8
gamma: 0.98
tau: 0.02

# --- 評価・保存の間隔（普段はいじらなくてよい）----------------------
eval_freq: 10000
n_eval_episodes: 10
checkpoint_freq: 50000

# --- W&B ------------------------------------------------------------
use_wandb: false
wandb_project: bipedal-timetrial
wandb_entity: null

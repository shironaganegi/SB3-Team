# =====================================================================
# smoke（配管確認用）: 学習→保存→評価が端から端まで通るかを数千ステップで確認するだけ。
# ちゃんとした方策は学習されません。「エラーなく一周回るか」を見るためのものです。
# 使い方:
#   python src/train.py --config configs/smoke.yaml
#   python src/evaluate.py models/<保存されたモデル>.zip
# =====================================================================

# --- ■ よく変える項目 ------------------------------------------------
env_id: BipedalWalker-v3
vel_coef: 0            # 0 = SpeedReward なし（素の TQC）
seed: 0
total_timesteps: 4000   # 配管確認用にごく短く

# --- TQC ハイパラ（smoke 用に learning_starts を小さくしてある）-----
learning_starts: 1000   # 総ステップが短いので、学習開始も早める
batch_size: 256
buffer_size: 300000
learning_rate: 7.3e-4
use_sde: true
train_freq: 8
gradient_steps: 8
gamma: 0.98
tau: 0.02

# --- 評価・保存の間隔（smoke 用に短く）------------------------------
eval_freq: 2000         # この間隔(step)ごとに素の環境で評価
n_eval_episodes: 3
checkpoint_freq: 2000   # 再開用チェックポイントの保存間隔

# --- W&B（smoke は基本オフ）----------------------------------------
use_wandb: false
wandb_project: bipedal-timetrial
wandb_entity: null

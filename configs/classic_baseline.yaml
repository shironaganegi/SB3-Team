# classic baseline: vel_coef=0 の素のTQC。まずこれで完走方策を固める。
env_id: BipedalWalker-v3
vel_coef: 0          # SpeedReward なし＝素の環境と同じ報酬
seed: 0
total_timesteps: 1000000

# --- TQC ハイパラ（araffin の BipedalWalker-v3 用既定）---
learning_starts: 10000
batch_size: 256
buffer_size: 300000
learning_rate: 7.3e-4
use_sde: true
train_freq: 8
gradient_steps: 8
gamma: 0.98
tau: 0.02

# --- コールバック・評価 ---
eval_freq: 10000
n_eval_episodes: 10
checkpoint_freq: 50000

# --- W&B ---
use_wandb: false
wandb_project: bipedal-timetrial
wandb_entity: null

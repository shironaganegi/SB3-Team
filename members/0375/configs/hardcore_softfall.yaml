# =====================================================================
# hardcore softfall: hardcore_finetune.yaml + 転倒ペナルティ緩和(fall_penalty)。
# 個人フォルダの config なので、resume先・実行結果は members/0375/HARDCORE_LOG.md
# に記録する（共有の configs/hardcore_next_run.yaml・README・BEST_CONFIG.mdは
# 触らない方針。members/README.md参照）。
#
# 使い方（Kaggleノート kaggle_hardcore_finetune.ipynb のセル4で上書き）:
#   RESUME_RUN_PATH = "sai3desuyo-/bipedal-timetrial/u2gz8q9k"
#   CONFIG_PATH = "members/0375/configs/hardcore_softfall.yaml"
#
# 2026-07-23 追記(1): resume元を 75glj5ue → 0fcv7lmb に更新。
# 0fcv7lmb は Kaggleノート編集ミスで fall_penalty が未適用のまま
# 75glj5ue から+100万step追加学習したrun（Hardcore完走率は65%のまま変化なし。
# 詳細は members/0375/HARDCORE_LOG.md）。完走率は同じだが到達step数が多い分だけ
# 有利なので、無駄にせずこちらを次のresume元にする。
#
# 2026-07-23 追記(2): resume元を 0fcv7lmb → urb2pqe1 に更新。
# urb2pqe1 は 0fcv7lmb から fall_penalty=-10 を実際に適用して+100万step。
# Hardcore完走率55%（0fcv7lmbの65%から悪化）だが、失敗の中身は狙った
# 失敗モード2件が解消・別の4件が新規発生という入れ替わりで、1周だけでは
# ノイズか悪化傾向か判断できない（詳細は HARDCORE_LOG.md）。同条件でもう1周
# 回して傾向を見る。
#
# 2026-07-23 追記(3): fall_penalty を -10 → -30 に変更、resume元を u2gz8q9k に更新。
# urb2pqe1 → u2gz8q9k と fall_penalty=-10 で2周連続55%（baseline 0fcv7lmbの
# 65%を明確に下回る）。狙った失敗モード(PIT/STUMP前の臆病さ)は解消できていた一方、
# 通常の草地での「投げやりな転倒」が新規に増えていた。-10まで下げすぎたと判断し、
# -100と-10の中間の-30を試す（詳細は HARDCORE_LOG.md）。
# =====================================================================

env_id: BipedalWalkerHardcore-v3
vel_coef: 0
fall_penalty: -30    # -10は下げすぎて「投げやりな転倒」が増加。根拠は members/0375/HARDCORE_LOG.md
seed: 0
total_timesteps: 800000   # 前回runが12時間上限で89万/100万止まりだったため、正常終了を優先

# --- TQC ハイパラ（--resume 時は使われない）-------------------------
learning_starts: 10000
batch_size: 256
buffer_size: 300000
learning_rate: 7.3e-4
use_sde: true
train_freq: 8
gradient_steps: 8
gamma: 0.98
tau: 0.02

# --- 評価・保存の間隔 ------------------------------------------------
eval_freq: 10000
n_eval_episodes: 15   # best_model選抜のノイズを減らすため10→15
checkpoint_freq: 50000

# --- W&B --------------------------------------------------------------
use_wandb: false   # Kaggleノート側でTrueに上書きされる(セル4参照)
wandb_project: bipedal-timetrial
wandb_entity: null

# =====================================================================
# hardcore softfall: hardcore_finetune.yaml + 転倒ペナルティ緩和(fall_penalty)。
# 個人フォルダの config なので、resume先・実行結果は members/0375/HARDCORE_LOG.md
# に記録する（共有の configs/hardcore_next_run.yaml・README・BEST_CONFIG.mdは
# 触らない方針。members/README.md参照）。
#
# 使い方（Kaggleノート kaggle_hardcore_finetune.ipynb のセル4で上書き）:
#   RESUME_RUN_PATH = "sai3desuyo-/bipedal-timetrial/75glj5ue"
#   CONFIG_PATH = "members/0375/configs/hardcore_softfall.yaml"
# =====================================================================

env_id: BipedalWalkerHardcore-v3
vel_coef: 0
fall_penalty: -10    # 転倒(-100)をここまで緩和。根拠は members/0375/HARDCORE_LOG.md
seed: 0
total_timesteps: 800000   # 前回runが12時間上限で89万/100万止まりだったため、正常終了を優先

# --- TQC ハイパラ（--resume 時は使われない）-------------------------
learning_starts: 10000
batch_size: 256
buffer_size: 300000
learning_rate: 7.3e-4
use_sde: true
train_freq: 8
gradient_steps: 8
gamma: 0.98
tau: 0.02

# --- 評価・保存の間隔 ------------------------------------------------
eval_freq: 10000
n_eval_episodes: 15   # best_model選抜のノイズを減らすため10→15
checkpoint_freq: 50000

# --- W&B --------------------------------------------------------------
use_wandb: false   # Kaggleノート側でTrueに上書きされる(セル4参照)
wandb_project: bipedal-timetrial
wandb_entity: null
